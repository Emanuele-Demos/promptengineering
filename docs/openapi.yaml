openapi: 3.1.0
info:
  title: WineCellar AI API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /auth/register:
    post:
      summary: Register a new user
      responses:
        "200":
          description: User and JWT token
  /auth/login:
    post:
      summary: Login with email and password
      responses:
        "200":
          description: User and JWT token
  /cellar/dashboard:
    get:
      summary: Cellar dashboard metrics
      responses:
        "200":
          description: Dashboard metrics
  /wines:
    get:
      summary: List wines
      responses:
        "200":
          description: Paginated wine collection
    post:
      summary: Create wine manually or from recognition result
      responses:
        "200":
          description: Created wine
  /wines/consume:
    post:
      summary: Save mandatory tasting review and consume one bottle
      description: Quantity is decremented only after all required tasting fields are valid.
      responses:
        "200":
          description: Tasting and updated wine
  /places/nearby:
    get:
      summary: Find nearby wineries, wine bars and wine shops
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
        - name: radius
          in: query
          required: false
          schema:
            type: integer
            default: 50000
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Nearby places from Geoapify ordered by distance